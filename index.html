<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocuX — EMG 体能追踪</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--fg:#f5f5f7;--dim:#86868b;--green:#30d158;--blue:#0a84ff;--card:rgba(255,255,255,0.06)}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",sans-serif;background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;line-height:1.5}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}

.hero{text-align:center;padding:120px 24px 80px}
.hero h1{font-size:clamp(2.5rem,6vw,4rem);font-weight:700;letter-spacing:-0.02em;margin-bottom:16px}
.hero h1 span{background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:1.15rem;color:var(--dim);max-width:520px;margin:0 auto 40px}
.badge{display:inline-block;padding:12px 32px;background:var(--fg);color:var(--bg);border-radius:980px;font-weight:600;font-size:1rem;transition:transform .2s}
.badge:hover{transform:scale(1.04);text-decoration:none}

.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;max-width:900px;margin:0 auto;padding:0 24px 80px}
.card{background:var(--card);border-radius:20px;padding:32px 28px}
.card h3{font-size:1.1rem;margin-bottom:8px}
.card p{font-size:.9rem;color:var(--dim)}
.icon{font-size:2rem;margin-bottom:12px}

footer{text-align:center;padding:40px 24px 60px;color:var(--dim);font-size:.85rem;border-top:1px solid rgba(255,255,255,0.06)}
footer a{color:var(--dim)}
footer nav{margin-bottom:12px}
footer nav a{margin:0 16px}
</style>
</head>
<body>

<section class="hero">
  <h1><span>FocuX</span></h1>
  <p>基于 EMG 肌电信号的实时体能追踪。连接手环，量化你的专注力、疲劳度与恢复节奏。</p>
  <a href="https://apps.apple.com/app/fluxchi/id0000000000" class="badge">在 App Store 下载</a>
</section>

<section class="features">
  <div class="card">
    <div class="icon">⚡</div>
    <h3>实时体能环</h3>
    <p>Stamina 值从 EMG 信号实时计算，直观展示你当前的工作续航能力。</p>
  </div>
  <div class="card">
    <div class="icon">📊</div>
    <h3>三维分析</h3>
    <p>一致性、紧张度、疲劳度三个维度，全面理解你的身体状态。</p>
  </div>
  <div class="card">
    <div class="icon">🔴</div>
    <h3>Live Activity</h3>
    <p>锁屏实时显示体能状态，无需解锁即可掌握当前续航。</p>
  </div>
  <div class="card">
    <div class="icon">🧠</div>
    <h3>智能建议</h3>
    <p>基于个性化模型，在合适的时机提醒你休息或继续专注。</p>
  </div>
</section>

<footer>
  <nav>
    <a href="privacy.html">隐私政策</a>
    <a href="support.html">支持</a>
    <a href="https://github.com/wujiajunhahah/Flux-hardware">GitHub</a>
  </nav>
  <p>&copy; 2026 FocuX. All rights reserved.</p>
</footer>

</body>
</html>
